
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded Publication Loader</title>
<style>
body{font-family:Arial;background:#0f172a;color:#e5e7eb;padding:2rem}
.pub-card{border:1px solid #475569;border-radius:18px;padding:1rem;margin-bottom:1rem;background:#1e293b;position:relative}
.pub-title{font-size:1.3rem;font-weight:700;margin-bottom:.8rem}
.pub-meta{display:flex;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.pub-venue{color:#cbd5e1}
.pub-date{color:#93c5fd;white-space:nowrap}
.pub-tags{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end;margin-top:1rem}
.tag{background:#334155;border:1px solid #64748b;padding:.25rem .6rem;border-radius:999px;font-size:.75rem}
</style>
</head>
<body>

<h1>Publications</h1>
<div id="pubs"></div>

<script>
async function loadManifest() {
    const res = await fetch("publications/manifest.json");
    return await res.json();
}

function parseEndnote(raw){
    const lines = raw.split("\n");
    const data = {authors:[]};

    for(const line of lines){
        if(line.startsWith("%T ")) data.title = line.slice(3).trim();
        if(line.startsWith("%A ")) data.authors.push(line.slice(3).trim());
        if(line.startsWith("%J ")) data.journal = line.slice(3).trim();
        if(line.startsWith("%D ")) data.year = line.slice(3).trim();
        if(line.startsWith("%R ")) data.doi = line.slice(3).trim();
    }

    return data;
}

async function renderPubs(){
    const manifest = await loadManifest();
    const container = document.getElementById("pubs");

    for(const file of manifest.papers){
        const res = await fetch("publications/" + file);
        const paper = await res.json();

        const parsed = parseEndnote(paper.citationRaw);

        const tags = (paper.tags || []).map(
            t => `<span class="tag">${t}</span>`
        ).join("");

        container.innerHTML += `
            <div class="pub-card">
                <div class="pub-title">${parsed.title}</div>

                <div>${parsed.authors.join(", ")}</div>

                <div class="pub-meta">
                    <div class="pub-venue">${parsed.journal}</div>
                    <div class="pub-date">${paper.published_date}</div>
                </div>

                <div>
                    <a href="https://doi.org/${parsed.doi}" target="_blank">
                        DOI: ${parsed.doi}
                    </a>
                </div>

                <div class="pub-tags">
                    ${tags}
                </div>
            </div>
        `;
    }
}

renderPubs();
</script>

</body>
</html>
