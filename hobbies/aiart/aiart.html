<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A.I. Art</title>
  <link rel="icon" type="image/png" href="../krafts-images/krafts.png">

  <!-- FONTS -->

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#050712;
      --bg2:#0b1430;
      --bg3:#070a14;
      --glass: rgba(15,23,42,0.70);
      --border: rgba(148,163,184,0.35);
      --text: #e5e7eb;
      --muted: rgba(226,232,240,0.72);
      --shadow: 0 22px 55px rgba(0,0,0,0.55);
      --r: 18px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      color: var(--text);
      font-family: 'Caveat', cursive;
      font-size: 1.15rem;
      line-height: 1.7;
      background:
        radial-gradient(circle at 14% 22%, rgba(245,158,11,0.16), transparent 55%),
        radial-gradient(circle at 86% 30%, rgba(139,92,246,0.14), transparent 55%),
        radial-gradient(circle at 70% 88%, rgba(56,189,248,0.10), transparent 55%),
        linear-gradient(140deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
      background-attachment: fixed;
    }

    h1, h2, h3, .card-title {
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.3px;
    }

    .page{
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    .topbar{
      display:flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r);
      backdrop-filter: blur(16px);
    }

    .back, .close{
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: rgba(2,6,23,0.35);
      color: var(--text);
      cursor:pointer;
      text-decoration:none;
    }

    .grid{
      margin-top: 1rem;
      display:grid;
      grid-template-columns: repeat(3,1fr);
      gap: 0.85rem;
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      position:relative;
      aspect-ratio:16/10;
      border-radius: var(--r);
      overflow:hidden;
      cursor:pointer;
    }

    .card-media{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
    }

    .card-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    }

    .card-title{
      position:absolute;
      bottom:10px;
      left:10px;
      font-size:1.2rem;
    }

    .scrim{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      opacity:0;
      pointer-events:none;
      transition:0.2s;
    }

    .scrim.open{ opacity:1; pointer-events:auto; }

    .panel{
      position:fixed;
      inset:6vh 6vw;
      background:rgba(2,6,23,0.95);
      border-radius:20px;
      display:flex;
      flex-direction:column;
      opacity:0;
      transform:scale(0.95);
      transition:0.2s;
    }

    .panel.open{
      opacity:1;
      transform:scale(1);
    }

    .panel-header{
      display:flex;
      justify-content:space-between;
      padding:1rem;
    }

    .panel-body{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:1rem;
      padding:1rem;
    }

    .panel-media img{
      width:100%;
      object-fit:contain;
    }

    .desc{
      font-size:1.2rem;
    }

    /* ARROWS */
    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:2rem;
      cursor:pointer;
      opacity:0.2;
      transition:0.2s;
      user-select:none;
    }

    .nav:hover{ opacity:0.8; }

    .nav.left{ left:10px; }
    .nav.right{ right:10px; }

  </style>

</head>

<body>

<div class="page">
  <div class="topbar">
    <div>
      <h1>A.I. Art</h1>
      <p>Click any artwork to view details.</p>
    </div>
    <a class="back" href="../khans-krafts.html">Back to Khan's Krafts</a>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="scrim" id="scrim"></div>

<aside class="panel" id="panel">
  <div class="panel-header">
    <h2 id="panelTitle"></h2>
    <div>
      <span id="counter"></span>
      <button class="close" id="closeBtn">Close</button>
    </div>
  </div>

  <div class="panel-body">
    <div class="panel-media">
      <div class="nav left" id="prev">&#10094;</div>
      <img id="panelImg"/>
      <div class="nav right" id="next">&#10095;</div>
    </div>

```
<div>
  <div id="panelDate"></div>
  <p class="desc" id="panelDesc"></p>
</div>
```

  </div>
</aside>

<script>
const grid=document.getElementById("grid");
const panel=document.getElementById("panel");
const scrim=document.getElementById("scrim");
const closeBtn=document.getElementById("closeBtn");

const panelTitle=document.getElementById("panelTitle");
const panelImg=document.getElementById("panelImg");
const panelDesc=document.getElementById("panelDesc");
const panelDate=document.getElementById("panelDate");
const counter=document.getElementById("counter");

const prev=document.getElementById("prev");
const next=document.getElementById("next");

let ITEMS=[];
let i=0;

async function load(){
 const res=await fetch("items.json");
 ITEMS=await res.json();
 render();
}

function render(){
 grid.innerHTML=ITEMS.map((item,idx)=>`
  <div class="card" data-i="${idx}">
    <div class="card-media" style="background-image:url('${item.image}')"></div>
    <div class="card-overlay"></div>
    <div class="card-title">${item.title}</div>
  </div>
 `).join("");
}

function openPanel(idx){
 i=idx;
 update();
 panel.classList.add("open");
 scrim.classList.add("open");
}

function update(){
 const item=ITEMS[i];
 panelTitle.textContent=item.title;
 panelImg.src=item.image;
 panelDesc.textContent=item.shortDescription.join("\n\n");
 panelDate.textContent="Date Crafted: "+item.dateMade;
 counter.textContent=(i+1)+" / "+ITEMS.length;
}

function closePanel(){
 panel.classList.remove("open");
 scrim.classList.remove("open");
}

prev.onclick=()=>{ i=(i-1+ITEMS.length)%ITEMS.length; update(); }
next.onclick=()=>{ i=(i+1)%ITEMS.length; update(); }

grid.onclick=e=>{
 const c=e.target.closest(".card");
 if(c) openPanel(Number(c.dataset.i));
};

closeBtn.onclick=closePanel;
scrim.onclick=closePanel;

load();
</script>

</body>
</html>
