<!-- File: aiart.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A.I. Art</title>
  <link rel="icon" type="image/png" href="../krafts-images/krafts.png">

  <!-- Casual handwritten/artistic fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#050712;
      --bg2:#0b1430;
      --bg3:#070a14;
      --glass: rgba(15,23,42,0.70);
      --border: rgba(148,163,184,0.35);
      --text: #e5e7eb;
      --muted: rgba(226,232,240,0.78);
      --accent: #f59e0b;
      --shadow: 0 22px 55px rgba(0,0,0,0.55);
      --r: 18px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: 'Kalam', 'Patrick Hand', system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 22%, rgba(245,158,11,0.16), transparent 55%),
        radial-gradient(circle at 86% 30%, rgba(139,92,246,0.14), transparent 55%),
        radial-gradient(circle at 70% 88%, rgba(56,189,248,0.10), transparent 55%),
        linear-gradient(140deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
      background-attachment: fixed;
    }

    .page{
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 2.4rem;
    }

    .topbar{
      display:flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.1rem;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .titleblock h1{
      margin:0;
      font-family: 'Patrick Hand', 'Kalam', cursive;
      font-size: clamp(1.8rem, 3vw, 2.45rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .titleblock p{
      margin: 0.35rem 0 0;
      color: var(--muted);
      max-width: 70ch;
      font-family: 'Kalam', 'Patrick Hand', cursive;
      font-weight: 300;
      font-size: clamp(1.05rem, 1.25vw, 1.2rem);
      line-height: 1.65;
      letter-spacing: 0.01em;
    }

    .back{
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(147,197,253,0.55);
      background: rgba(2,6,23,0.35);
      color: #93c5fd;
      text-decoration:none;
      width: fit-content;
      align-self: flex-start;
      white-space: nowrap;
      font-family: 'Patrick Hand', 'Kalam', cursive;
      font-size: 1.28rem;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .grid{
      margin-top: 1rem;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
    }

    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px){
      .topbar{ flex-direction: column; }
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      position: relative;
      border-radius: var(--r);
      overflow:hidden;
      border: 1px solid var(--border);
      background: rgba(2,6,23,0.55);
      box-shadow: 0 18px 45px rgba(0,0,0,0.45);
      cursor: pointer;
      transition: transform 0.18s ease;
    }

    .card.horizontal{ aspect-ratio: 16 / 10; }
    .card.vertical{ aspect-ratio: 3 / 4; }

    .card:hover{ transform: translateY(-4px); }

    .card-media{
      position:absolute;
      inset:0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.8);
    }

    .card-overlay{
      position:absolute;
      inset:0;
      background: linear-gradient(to top, rgba(2,6,23,0.95), rgba(2,6,23,0.2));
    }

    .card-title{
      position:absolute;
      left: 0.95rem;
      bottom: 0.9rem;
      font-family: 'Patrick Hand', 'Kalam', cursive;
      font-size: clamp(1.45rem, 2.2vw, 1.75rem);
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.75);
    }

    /* ===== Center Panel ===== */
    .scrim{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 50;
    }

    .scrim.open{ opacity:1; pointer-events:auto; }

    .panel{
      position: fixed;
      inset: 6vh 6vw;
      background: rgba(2,6,23,0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 60;
      touch-action: pan-y;
      user-select: none;
    }

    .panel.open{
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .panel-header{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2{
      margin:0;
      font-family: 'Patrick Hand', 'Kalam', cursive;
      font-size: clamp(1.85rem, 3vw, 2.45rem);
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .panel-actions{
      display:flex;
      align-items:center;
      gap: 0.7rem;
      flex: 0 0 auto;
    }

    .counter{
      font-family: 'Kalam', 'Patrick Hand', cursive;
      color: rgba(226,232,240,0.86);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .close{
      background: rgba(2,6,23,0.20);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      padding: 0.35rem 0.8rem;
      cursor:pointer;
      font-family: 'Kalam', system-ui, sans-serif;
      font-weight: 700;
      font-size: 1.08rem;
      letter-spacing: 0.01em;
    }

    .panel-body{
      position: relative;
      display:grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 1rem;
      padding: 1rem;
      height: 100%;
      overflow: hidden;
    }

    .panel-media{
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border-radius: 16px;
    }

    .panel-media img{
      width:100%;
      height:auto;
      max-height:100%;
      object-fit: contain;
      display:block;
      pointer-events: none;
    }

    .panel-text{
      overflow:auto;
      padding-right: 0.4rem;
      user-select: text;
    }

    .date-made{
      margin: 0 0 0.75rem;
      font-family: 'Kalam', 'Patrick Hand', cursive;
      font-size: clamp(1.05rem, 1.25vw, 1.22rem);
      font-weight: 700;
      line-height: 1.35;
      color: rgba(226,232,240,0.95);
    }

    .desc{
      margin:0;
      color: var(--muted);
      font-family: 'Kalam', 'Patrick Hand', cursive;
      font-size: clamp(1.18rem, 1.45vw, 1.48rem);
      line-height: 1.72;
      letter-spacing: 0.01em;
      white-space: pre-line;
    }

    .nav-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.18);
      color: rgba(229,231,235,0.50);
      font-size: 1.65rem;
      line-height: 1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index: 3;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(6px);
      opacity: 0.45;
      transition: opacity 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    

    .nav-btn.prev::before{
      transform: rotate(-135deg);
      margin-left: 4px;
    }

    .nav-btn.next::before{
      transform: rotate(45deg);
      margin-right: 4px;
    }

    .nav-btn:hover,
    .nav-btn:focus-visible{
      opacity: 0.9;
      background: rgba(15,23,42,0.62);
      color: rgba(229,231,235,0.9);
      border-color: rgba(148,163,184,0.45);
      outline: none;
    }

    .nav-btn.prev{ left: 0.8rem; }
    .nav-btn.next{ right: 0.8rem; }

    @media (max-width: 700px){
      .panel{
        inset: 4vh 4vw;
      }

      .panel-header{
        padding: 0.85rem 0.95rem;
      }

      .panel-body{
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        padding: 0.8rem;
      }

      .panel-media{
        height: 42vh;
        max-height: 42vh;
      }

      .panel-media img{
        width: 100%;
        height: 100%;
        max-height: 42vh;
        object-fit: contain;
      }

      .panel-text{
        overflow: auto;
        padding-right: 0.4rem;
      }

      .desc{
        font-size: 1.15rem;
        line-height: 1.64;
      }

      .nav-btn{
        width: 36px;
        height: 36px;
        opacity: 0.35;
      }

      

      .nav-btn.prev{ left: 0.45rem; }
      .nav-btn.next{ right: 0.45rem; }
    }
  </style>
</head>

<body>

<div class="page">
  <div class="topbar">
    <div class="titleblock">
      <h1>A.I. Art</h1>
      <p>Click any artwork to view details.</p>
    </div>
    <a class="back" href="../khans-krafts.html">Back to Khan's Krafts</a>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="scrim" id="scrim"></div>

<aside class="panel" id="panel" aria-hidden="true">
  <div class="panel-header">
    <h2 id="panelTitle"></h2>
    <div class="panel-actions">
      <div class="counter" id="panelCounter"></div>
      <button class="close" id="closeBtn">Close</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody">
    <button class="nav-btn prev" id="prevBtn" aria-label="Previous item">&lsaquo;</button>
    <div class="panel-media">
      <img id="panelImg" src="" alt="" />
    </div>
    <div class="panel-text">
      <div class="date-made" id="panelDateMade"></div>
      <p class="desc" id="panelDesc"></p>
    </div>
    <button class="nav-btn next" id="nextBtn" aria-label="Next item">&rsaquo;</button>
  </div>
</aside>

<script>
  const grid = document.getElementById("grid");
  const panel = document.getElementById("panel");
  const panelBody = document.getElementById("panelBody");
  const scrim = document.getElementById("scrim");
  const closeBtn = document.getElementById("closeBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const panelTitle = document.getElementById("panelTitle");
  const panelImg = document.getElementById("panelImg");
  const panelDesc = document.getElementById("panelDesc");
  const panelDateMade = document.getElementById("panelDateMade");
  const panelCounter = document.getElementById("panelCounter");

  let ITEMS = [];
  let currentIndex = 0;
  let dragStartX = 0;
  let dragStartY = 0;
  let dragging = false;

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      "\"":"&quot;",
      "'":"&#39;"
    }[c]));
  }

  function formatDatePretty(iso){
    if(!iso) return "";
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  }

  async function loadItems(){
    const res = await fetch("items.json",{cache:"no-store"});
    ITEMS = await res.json();
    ITEMS.sort((a,b)=>new Date(b.dateMade||0)-new Date(a.dateMade||0));
    render();
  }

  function render(){
    grid.innerHTML = ITEMS.map((item,i)=>`
      <div class="card ${escapeHtml(item.orientation||"horizontal")}" data-i="${i}" tabindex="0">
        <div class="card-media" style="background-image:url('${escapeHtml(item.image||"")}')"></div>
        <div class="card-overlay"></div>
        <div class="card-title">${escapeHtml(item.title||"")}</div>
      </div>
    `).join("");
  }

  function updatePanel(){
    const item = ITEMS[currentIndex];
    if(!item) return;
    panelTitle.textContent = item.title || "";
    panelImg.src = item.image || "";
    panelImg.alt = item.title || "";
    panelDesc.textContent = Array.isArray(item.shortDescription)
      ? item.shortDescription.join("\n\n")
      : item.shortDescription || "";
    panelDateMade.textContent = item.dateMade
      ? `Date Crafted: ${formatDatePretty(item.dateMade)}`
      : "";
    panelCounter.textContent = `${currentIndex + 1} / ${ITEMS.length}`;
  }

  function openPanel(index){
    currentIndex = Number(index) || 0;
    updatePanel();
    panel.classList.add("open");
    scrim.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
    document.body.style.overflow="hidden";
  }

  function closePanel(){
    panel.classList.remove("open");
    scrim.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
    document.body.style.overflow="";
  }

  function showRelative(direction){
    if(!ITEMS.length) return;
    currentIndex = (currentIndex + direction + ITEMS.length) % ITEMS.length;
    updatePanel();
  }

  grid.addEventListener("click",e=>{
    const c=e.target.closest(".card");
    if(c) openPanel(c.dataset.i);
  });

  grid.addEventListener("keydown",e=>{
    if(e.key !== "Enter" && e.key !== " ") return;
    const c=e.target.closest(".card");
    if(!c) return;
    e.preventDefault();
    openPanel(c.dataset.i);
  });

  closeBtn.addEventListener("click",closePanel);
  scrim.addEventListener("click",closePanel);
  prevBtn.addEventListener("click",()=>showRelative(-1));
  nextBtn.addEventListener("click",()=>showRelative(1));

  function pointerStart(e){
    if(!panel.classList.contains("open")) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
  }

  function pointerEnd(e){
    if(!dragging) return;
    dragging = false;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.2){
      showRelative(dx < 0 ? 1 : -1);
    }
  }

  panelBody.addEventListener("pointerdown", pointerStart);
  panelBody.addEventListener("pointerup", pointerEnd);
  panelBody.addEventListener("pointercancel", ()=>{ dragging = false; });

  document.addEventListener("keydown",e=>{
    if(!panel.classList.contains("open")) return;
    if(e.key === "Escape") closePanel();
    if(e.key === "ArrowLeft") showRelative(-1);
    if(e.key === "ArrowRight") showRelative(1);
  });

  loadItems();
</script>

</body>
</html>
