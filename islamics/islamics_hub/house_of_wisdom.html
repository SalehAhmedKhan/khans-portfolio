<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House of Wisdom</title>
  <link rel="icon" type="image/png" href="../islamk2.png">

  <!-- Islamic/calligraphic fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Lateef:wght@400;500;600;700&family=Scheherazade+New:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body{
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body{
      font-family: 'Aref Ruqaa', 'Scheherazade New', serif;
      color: #e5e7eb;
      overflow-x: hidden;
      position: relative;
      background:
        radial-gradient(circle at 50% 0%, rgba(16,185,129,0.20) 0%, rgba(16,185,129,0.08) 34%, rgba(16,185,129,0.02) 62%, rgba(16,185,129,0.00) 100%),
        radial-gradient(circle at top left, rgba(16,185,129,0.22) 0%, rgba(16,185,129,0.10) 40%, rgba(16,185,129,0.03) 70%, rgba(16,185,129,0.00) 100%),
        linear-gradient(180deg, #04130c 0%, #04130c 55%, #03100a 78%, #020617 100%);
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-size: 100% 100%, 100% 100%, 100% 100%;
      background-attachment: fixed, fixed, fixed;
    }

    body::before{
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 1px, rgba(0,0,0,0.00) 2px, rgba(0,0,0,0.00) 4px);
    }

    body > *{
      position: relative;
      z-index: 1;
    }

    h1, h2, h3, .card h3{
      font-family: 'Aref Ruqaa', 'Scheherazade New', serif;
      letter-spacing: 0.025em;
      -webkit-text-stroke: 0.25px rgba(209,250,229,0.45);
      text-shadow:
        0 1px 0 rgba(2,6,23,0.65),
        0 0 10px rgba(16,185,129,0.18);
    }

    p, a, .eyebrow, .back-btn, .card p{
      font-family: 'Aref Ruqaa', 'Scheherazade New', serif;
      letter-spacing: 0.01em;
    }

    .page-shell{
      width: 100%;
      margin: 0;
      padding: 0 0 2.2rem;
    }

    .landing-card{
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 26%, rgba(16,185,129,0.10), transparent 42%),
        linear-gradient(180deg, transparent 0%, #04130c 46%, #03100a 76%, #020617 100%);
    }


    /* ===== Hanging archive banners: screen-edge tapestry style ===== */
    .archive-banners{
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 34vh;
      pointer-events: none;
      z-index: 3;
    }

    .banner-cluster{
      position: absolute;
      top: 0;
      display: flex;
      gap: clamp(0.7rem, 1.35vw, 1.05rem);
      align-items: flex-start;
    }

    .banner-cluster.left{
      left: clamp(0.55rem, 2.2vw, 2.3rem);
    }

    .banner-cluster.right{
      right: clamp(0.55rem, 2.2vw, 2.3rem);
    }

    .archive-banner{
      width: clamp(82px, 7.6vw, 112px);
      height: clamp(152px, 18vh, 202px);
      min-height: 0;
      padding: 1.45rem 0.78rem 2.05rem;
      box-sizing: border-box;
      text-align: center;
      color: #f8f0c8;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,232,166,0.20), transparent 42%),
        linear-gradient(90deg, rgba(255,232,166,0.12), transparent 19%, transparent 81%, rgba(255,232,166,0.12)),
        repeating-linear-gradient(135deg, rgba(255,232,166,0.035) 0 7px, rgba(0,0,0,0.00) 7px 16px),
        linear-gradient(180deg, rgba(13,70,47,0.96), rgba(3,34,23,0.94));
      border: 1px solid rgba(218,177,91,0.72);
      border-top: 0;
      border-radius: 0;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 25px), 50% 100%, 0 calc(100% - 25px));
      box-shadow:
        0 18px 42px rgba(0,0,0,0.44),
        inset 0 0 0 1px rgba(255,246,210,0.09),
        inset 0 0 36px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transform-origin: top center;
      animation: bannerDropIn 0.9s cubic-bezier(.18,.78,.22,1) both;
      position: relative;
      overflow: hidden;
    }

    .archive-banner:nth-child(2){
      margin-top: 0;
      animation-delay: 0.10s;
    }

    .archive-banner:nth-child(3){
      margin-top: 0;
      animation-delay: 0.20s;
    }

    .archive-banner::before,
    .archive-banner::after{
      content: none;
    }

    .archive-banner .banner-number::before{
      content: "";
      display: block;
      margin-bottom: 0.42rem;
      color: #f7d98a;
      font-size: 0.68rem;
      line-height: 1;
      text-shadow: 0 0 10px rgba(247,217,138,0.38);
    }

    .banner-number{
      display: block;
      font-size: clamp(1.45rem, 2.55vw, 2.08rem);
      line-height: 1;
      font-weight: 700;
      color: #fff3c7;
      text-shadow:
        0 1px 0 rgba(0,0,0,0.60),
        0 0 15px rgba(218,177,91,0.28);
    }

    .banner-label{
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 2.35em;
      margin-top: 0.48rem;
      font-size: clamp(0.66rem, 0.86vw, 0.82rem);
      line-height: 1.05;
      color: #d1fae5;
      text-shadow: 0 1px 6px rgba(0,0,0,0.70);
    }

    .archive-banner .banner-label::before,
    .archive-banner .banner-label::after{
      content: "";
      display: block;
      width: 42%;
      height: 1px;
      margin: 0.34rem auto;
      background: linear-gradient(to right, transparent, rgba(218,177,91,0.70), transparent);
    }

    @keyframes bannerDropIn{
      0%{
        opacity: 0;
        transform: translateY(-38px) scaleY(0.94);
      }
      70%{
        opacity: 1;
        transform: translateY(4px) scaleY(1.01);
      }
      100%{
        opacity: 1;
        transform: translateY(0) scaleY(1);
      }
    }


    @media (prefers-reduced-motion: reduce){
      .archive-banner{ animation: none; }
    }

    /* ===== Top image / intro: kept as requested ===== */
    .hero-image{
      position: relative;
      min-height: 76vh;
      width: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-image::before{
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background-image: var(--hero-bg, url("../houseofwisdom3.png"), url("houseofwisdom3.png"));
      background-size: cover;
      background-position: center top;
      opacity: 0.98;
      filter: saturate(1.02) contrast(1.03);
      transform: scale(1.01);
    }

    .hero-image::after{
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at center 40%, rgba(4,19,12,0.04) 0%, rgba(4,19,12,0.20) 42%, rgba(4,19,12,0.76) 78%, #04130c 100%),
        linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(4,19,12,0.18) 36%, rgba(4,19,12,0.60) 64%, rgba(4,19,12,0.92) 86%, #04130c 100%),
        linear-gradient(90deg, rgba(4,19,12,0.92) 0%, rgba(4,19,12,0.48) 13%, transparent 31%, transparent 69%, rgba(4,19,12,0.48) 87%, rgba(4,19,12,0.92) 100%);
    }

    .hero-fade{
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 52vh;
      z-index: -1;
      background:
        linear-gradient(180deg, transparent 0%, rgba(4,19,12,0.20) 20%, rgba(4,19,12,0.72) 58%, #04130c 88%, #04130c 100%);
    }

    .intro-panel{
      width: min(760px, calc(100% - 2rem));
      text-align: center;
      padding: clamp(1.3rem, 3vw, 2.1rem);
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      margin-top: 8vh;
    }

    .eyebrow{
      color: #a7f3d0;
      font-family: 'Lateef', 'Scheherazade New', serif;
      font-size: clamp(3.4rem, 7vw, 6.4rem);
      line-height: 0.85;
      margin-bottom: 0.25rem;
      opacity: 0.95;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    h1{
      margin: 0;
      font-size: clamp(1.9rem, 4.1vw, 3.45rem);
      line-height: 1.04;
      color: #d1fae5;
      white-space: nowrap;
    }

    p{
      margin: 0.45rem 0;
      color: #cbd5f5;
      line-height: 1.72;
      font-size: 1.08rem;
      text-shadow: 0 2px 7px rgba(0,0,0,0.72);
    }

    .intro-panel p{
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(0.94rem, 1.42vw, 1.12rem);
      color: #f3f4e8;
    }

    .intro-link{
      color: #a7f3d0;
      text-decoration: none;
      border-bottom: 1px solid rgba(167,243,208,0.75);
      font-weight: 700;
    }

    .intro-link:hover{
      color: #d1fae5;
      border-bottom-color: #d1fae5;
    }

    /* ===== Original-style card/button layout ===== */
    .hero-content{
      padding: 1.15rem 1.6rem 0;
      margin-top: 0;
      position: relative;
      z-index: 2;
    }

    .hero-content::before{
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      background:
        radial-gradient(circle at center, rgba(255,243,199,0.92) 0 2px, transparent 3px),
        linear-gradient(to right, transparent, rgba(218,177,91,0.48) 10%, rgba(255,243,199,0.88) 50%, rgba(218,177,91,0.48) 90%, transparent);
      box-shadow:
        0 0 14px rgba(218,177,91,0.32),
        0 1px 0 rgba(255,246,210,0.18);
      pointer-events: none;
    }

    .cards-section{
      padding: 0;
    }

    .section-title{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.75rem, 2vw, 1.35rem);
      margin: -1.0rem auto 1rem;
      font-family: 'Aref Ruqaa', 'Scheherazade New', serif;
      font-size: clamp(1.1rem, 1.9vw, 1.65rem);
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.055em;
      color: #fff3c7;
      background: linear-gradient(180deg, #fff8d7 0%, #f7d98a 44%, #d9a84e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 1px 0 rgba(0,0,0,0.72),
        0 0 10px rgba(255,243,199,0.18),
        0 0 22px rgba(218,177,91,0.26),
        0 0 36px rgba(16,185,129,0.10);
      position: relative;
    }

    .section-title::before,
    .section-title::after{
      content: "";
      width: min(210px, 26vw);
      height: 2px;
      background:
        radial-gradient(circle at center, rgba(255,243,199,0.95) 0 2px, transparent 3px),
        linear-gradient(to right, transparent, rgba(218,177,91,0.88), rgba(255,243,199,0.78), rgba(218,177,91,0.88), transparent);
      box-shadow: 0 0 12px rgba(218,177,91,0.28);
    }

    .section-title span{
      position: relative;
      display: inline-block;
      padding: 0 0.25rem;
    }

    .section-title span::before,
    .section-title span::after{
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(190px, 82%);
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(218,177,91,0.62), transparent);
      opacity: 0.9;
    }

    .section-title span::before{ top: -0.42rem; }
    .section-title span::after{ bottom: -0.42rem; }

    .cards-shell{
      width: 100%;
      margin: 0 auto;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      overflow: hidden;
      padding: 0;
    }

    .cards-grid{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.05rem;
      width: 100%;
      margin: 0 auto;
    }

    .card-link{
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
      border-radius: 16px;
      outline: none;
      background: transparent;
      border: none;
      padding: 0;
      text-align: center;
      cursor: pointer;
    }

    .card{
      background: rgba(2,6,23,0.55);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      display: grid;
      place-items: center;
      min-height: 330px;
      height: 100%;
      position: relative;
      isolation: isolate;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .card::before{
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      background:
        radial-gradient(circle at 0% 0%, rgba(167,243,208,0.38) 0%, rgba(16,185,129,0.18) 12%, transparent 31%),
        radial-gradient(circle at 100% 0%, rgba(167,243,208,0.34) 0%, rgba(16,185,129,0.16) 12%, transparent 31%),
        radial-gradient(circle at 0% 100%, rgba(167,243,208,0.34) 0%, rgba(16,185,129,0.16) 12%, transparent 31%),
        radial-gradient(circle at 100% 100%, rgba(167,243,208,0.38) 0%, rgba(16,185,129,0.18) 12%, transparent 31%);
      filter: blur(1px);
    }

    .card::after{
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      border-radius: 16px;
      transition: opacity 0.22s ease;
      box-shadow:
        inset 0 0 0 1px rgba(167,243,208,0.38),
        inset 0 0 26px rgba(16,185,129,0.12),
        0 0 22px rgba(16,185,129,0.14);
    }

    .card-link:hover .card,
    .card-link:focus-visible .card{
      transform: translateY(-2px);
      border-color: rgba(16,185,129,0.45);
      background: rgba(2,6,23,0.62);
      box-shadow:
        0 18px 44px rgba(0,0,0,0.50),
        0 0 28px rgba(16,185,129,0.13);
    }

    .card-link:hover .card::before,
    .card-link:focus-visible .card::before{
      opacity: 1;
    }

    .card-link:hover .card::after,
    .card-link:focus-visible .card::after{
      opacity: 1;
    }

    .card-media{
      position: absolute;
      inset: 0;
      z-index: -2;
      background: rgba(15,23,42,0.55);
      overflow: hidden;
    }

    .card-media::before{
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--img, none);
      background-size: cover;
      background-position: center;
      opacity: 0.95;
      transform: scale(1.01);
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .card-media::after{
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(4,19,12,0.24), rgba(2,6,23,0.72) 72%),
        linear-gradient(180deg, rgba(2,6,23,0.34), rgba(2,6,23,0.78));
    }

    .card-link:hover .card-media::before,
    .card-link:focus-visible .card-media::before{
      transform: scale(1.055);
      opacity: 1;
    }

    .card-body{
      padding: 3.2rem clamp(1.15rem, 3vw, 2.4rem) 2.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      min-height: 100%;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .card-body::before,
    .card-body::after{
      content: "";
      display: block;
      width: min(170px, 52%);
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(167,243,208,0.70), transparent);
      opacity: 0;
      transform: scaleX(0.72);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .card-link:hover .card-body::before,
    .card-link:hover .card-body::after,
    .card-link:focus-visible .card-body::before,
    .card-link:focus-visible .card-body::after{
      opacity: 1;
      transform: scaleX(1);
    }

    .card h3{
      margin: 0;
      font-size: clamp(1.18rem, 2.05vw, 1.55rem);
      font-weight: 700;
      color: #d1fae5;
    }

    .card p{
      margin: 0;
      max-width: 540px;
      font-size: clamp(0.98rem, 1.28vw, 1.08rem);
      line-height: 1.65;
      color: #f3f4e8;
    }

    .bottom-cta{
      display: flex;
      justify-content: center;
      padding: 2.2rem 1.6rem 0;
    }

    .back-btn{
      padding: 0.65rem 1.35rem;
      border-radius: 999px;
      border: 1px solid rgba(16,185,129,0.45);
      background: rgba(2,6,23,0.6);
      color: #a7f3d0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .back-btn:hover{
      background: rgba(16,185,129,0.18);
    }

    @media (max-width: 900px){
      .archive-banners{ opacity: 0.86; }
      .archive-banner{ width: 68px; height: 132px; min-height: 0; padding: 1.1rem 0.45rem 1.7rem; }
      .banner-cluster{ gap: 0.45rem; }
      .hero-image{ min-height: 72vh; }
      .hero-content{ margin-top: 0; padding: 1rem 1.2rem 0; }
    }

    @media (max-width: 640px){
      h1{ white-space: normal; }
      .hero-image{
        min-height: 760px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-bottom: 1.2rem;
      }
      .intro-panel{
        width: min(100% - 1.2rem, 760px);
        margin-top: 4vh;
        order: 1;
      }
      .archive-banners{
        position: relative;
        order: 2;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.55rem;
        width: min(100% - 1.2rem, 390px);
        height: auto;
        margin: 1rem auto 0;
        opacity: 1;
      }
      .banner-cluster{
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        justify-content: center;
        gap: 0.5rem;
      }
      .banner-cluster.left,
      .banner-cluster.right{
        left: auto;
        right: auto;
      }
      .archive-banner{
        width: 30%;
        height: 104px;
        min-height: 0;
        padding: 0.85rem 0.32rem 1.4rem;
        animation: bannerDropIn 0.8s cubic-bezier(.18,.78,.22,1) both;
      }
      .archive-banner:nth-child(2),
      .archive-banner:nth-child(3){
        margin-top: 0;
      }
      .banner-number{ font-size: 1.25rem; }
      .banner-label{ font-size: 0.62rem; min-height: 2.45em; }
      .cards-grid{ grid-template-columns: 1fr; }
      .card{ min-height: 290px; }
    }
  </style>
</head>

<body>
  <main class="page-shell">
    <section class="landing-card" aria-label="House of Wisdom landing area">
      <div class="hero-image" id="heroImage">
        <div class="archive-banners" aria-hidden="true">
          <div class="banner-cluster left" id="bannerLeft"></div>
          <div class="banner-cluster right" id="bannerRight"></div>
        </div>

        <article class="intro-panel">
          <div class="eyebrow" lang="ar" dir="rtl">بيت الحكمة</div>
          <h1>The House of Wisdom</h1>
          <p id="introText"></p>
          <p>
            If you want to contribute, suggest a correction, or share resources — <a class="intro-link" id="contactLink" href="#">contact me!</a>
          </p>
          <p style="margin-top:0.9rem;font-size:0.92rem;color:#a7f3d0;">
            <strong>Last updated:</strong> <span id="lastUpdated"></span>
          </p>
        </article>
        <div class="hero-fade" aria-hidden="true"></div>
      </div>

      <div class="hero-content">
        <section class="cards-section" aria-label="House of Wisdom cards">
          <div class="cards-shell">
            <h2 class="section-title"><span>Scholars' Chambers</span></h2>
            <div class="cards-grid" id="cardsGrid"></div>
          </div>
        </section>
      </div>
    </section>

    <div class="bottom-cta">
      <a class="back-btn" id="faithCornerLink" href="#">Return to The Faith Corner</a>
    </div>
  </main>

  <script>
    const DATA_FILE = "house-of-wisdom-data.json";

    function cssUrlList(paths) {
      return paths.map(path => `url("${path}")`).join(", ");
    }

    function makeBanner(banner) {
      const item = document.createElement("div");
      item.className = "archive-banner";
      item.innerHTML = `
        <span class="banner-number">${banner.number}</span>
        <span class="banner-label">${banner.title}</span>
      `;
      return item;
    }

    function makeCard(card) {
      const link = document.createElement("a");
      link.className = "card-link";
      link.href = card.link || "#";

      link.innerHTML = `
        <article class="card">
          <div class="card-media"></div>
          <div class="card-body">
            <h3>${card.title}</h3>
            <p>${card.description}</p>
          </div>
        </article>
      `;

      const media = link.querySelector(".card-media");
      media.style.setProperty("--img", cssUrlList(card.images || []));
      return link;
    }

    async function loadHouseOfWisdom() {
      try {
        const response = await fetch(DATA_FILE);
        if (!response.ok) throw new Error(`Could not load ${DATA_FILE}`);
        const data = await response.json();

        const page = data.page || {};
        const banners = data.banners || [];
        const cards = data.cards || [];

        if (page.backgroundImages?.length) {
          document.getElementById("heroImage").style.setProperty("--hero-bg", cssUrlList(page.backgroundImages));
        }

        document.getElementById("introText").textContent = page.introText || "";
        document.getElementById("lastUpdated").textContent = page.lastUpdated || "";

        const contactLink = document.getElementById("contactLink");
        contactLink.href = page.contactEmail ? `mailto:${page.contactEmail}` : "#";

        const faithCornerLink = document.getElementById("faithCornerLink");
        faithCornerLink.href = page.faithCornerLink || "#";
        faithCornerLink.textContent = page.faithCornerText || "Return to The Faith Corner";

        const left = document.getElementById("bannerLeft");
        const right = document.getElementById("bannerRight");
        left.innerHTML = "";
        right.innerHTML = "";
        banners.slice(0, 3).forEach(banner => left.appendChild(makeBanner(banner)));
        banners.slice(3, 6).forEach(banner => right.appendChild(makeBanner(banner)));

        const grid = document.getElementById("cardsGrid");
        grid.innerHTML = "";
        cards.forEach(card => grid.appendChild(makeCard(card)));
      } catch (error) {
        console.error(error);
      }
    }

    loadHouseOfWisdom();
  </script>
</body>
</html>
