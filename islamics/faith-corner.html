<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Faith Corner</title>
  <link rel="icon" type="image/png" href="islamk2.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body{
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body{
      font-family: 'Aref Ruqaa', serif;
      color: #e5e7eb;

      background:
        radial-gradient(circle at top left,
          rgba(16,185,129,0.22) 0%,
          rgba(16,185,129,0.10) 40%,
          rgba(16,185,129,0.03) 70%,
          rgba(16,185,129,0.00) 100%
        ),
        linear-gradient(180deg, #04130c 0%, #020617 100%);

      background-attachment: fixed;
    }

    h1, h2, h3{
      font-family: 'Aref Ruqaa', serif;
      text-shadow: 0 0 10px rgba(16,185,129,0.18);
    }

    p{
      font-size: 1.05rem; /* increased */
      line-height: 1.7;
      color: #cbd5f5;
    }

    .last-updated{
      font-size: 0.95rem; /* increased */
    }

    .top-wrap{
      padding: 1.6rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    .container{
      padding: 2.2rem 2rem;
      background: rgba(2,6,23,0.55);
      border-radius: 18px;
    }

    h1{
      font-size: 2.6rem; /* slightly bigger */
      color: #d1fae5;
    }

    .divider{
      width: 60px;
      height: 2px;
      margin: 1.1rem 0;
      background: linear-gradient(to right, #10b981, transparent);
    }

    .cards-wrap{
      padding: 1.6rem;
    }

    .cards-grid{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .card{
      background: rgba(2,6,23,0.55);
      border-radius: 16px;
      padding: 1rem;
      min-height: 320px;
    }

    .card h3{
      font-size: 1.2rem; /* increased */
      color: #d1fae5;
    }

    .card p{
      font-size: 1rem; /* increased */
      line-height: 1.65;
    }

    .back-btn{
      font-size: 0.95rem;
    }

    .panel-text h2{
      font-size: 1.5rem; /* slightly increased */
    }

    .panel-text p{
      font-size: 1.05rem; /* increased */
      line-height: 1.7;
    }

    @media (max-width: 900px){
      .top-wrap{
        grid-template-columns: 1fr;
      }
      .cards-grid{
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px){
      .cards-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="top-wrap">
    <div class="container">
      <h1>The Faith Corner</h1>
      <div class="divider"></div>

      <p>A quiet space for reflection, grounding, and remembrance.</p>
      <p>Here, faith is not argued or displayed — it is simply lived, slowly and sincerely.</p>
      <p class="last-updated">Last updated: 4 February 2026</p>
    </div>

    <div class="calligraphy-slot"></div>
  </div>

  <div class="cards-wrap">
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <div style="text-align:center; padding:2rem;">
    <a class="back-btn" href="../index.html">Return to my Professional Portfolio</a>
  </div>

</body>
</html>
