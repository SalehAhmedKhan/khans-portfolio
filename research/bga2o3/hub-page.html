<!-- File: hub-page.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading…</title>

    <!-- FAVICON (STATIC: NOT FROM JSON) -->
    <link rel="icon" type="image/png" href="../../favicon1.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #f5f5f5;

            --g1: rgba(80,120,255,0.12);
            --g2: rgba(0,200,180,0.08);
            --bgA: #0b0f1a;
            --bgB: #111827;
            --bgC: #0a0e17;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255,255,255,0.15);
            --panel-bg: rgba(19, 26, 41, 0.96);

            background:
                radial-gradient(circle at 20% 20%, var(--g1), transparent 40%),
                radial-gradient(circle at 80% 30%, var(--g2), transparent 45%),
                linear-gradient(135deg, var(--bgA), var(--bgB) 60%, var(--bgC));
            background-attachment: fixed;
        }

        header { padding: 2rem 1.5rem; text-align: center; }
        header h1 { margin: 0 0 0.5rem 0; font-size: 2rem; font-weight: 600; }
        header p { margin: 0; opacity: 0.9; }

        .container {
            max-width: 980px;
            margin: 2rem auto;
            padding: 0 1.5rem 2rem;
        }

        .section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(6px);
            color: #f5f5f5;
            box-shadow: 0 14px 40px rgba(0,0,0,0.22);
        }

        .section h2 { margin-top: 0; }

        .section-intro {
            margin: 0.35rem 0 0.9rem;
            font-size: 0.95rem;
            opacity: 0.95;
        }

        .section-quote {
            margin: 0.5rem 0 0.25rem;
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .scroll-row {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 0.5rem;
        }

        .hub-card,
        .low-box {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 1rem;
            backdrop-filter: blur(4px);
            color: #fff;
            box-sizing: border-box;
            display: block;
            text-decoration: none;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
        }

        .hub-card:hover,
        .low-box:hover {
            transform: translateY(-2px);
            border-color: rgba(159, 201, 255, 0.42);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 24px rgba(0,0,0,0.22);
        }

        .scroll-row .hub-card { min-width: 240px; }

        .hub-card-title { margin: 0 0 0.4rem; font-weight: 600; }
        .hub-card-desc { margin: 0; font-size: 0.85rem; opacity: 0.85; }

        .group-card { min-width: 260px; }
        .group-affiliation { margin: 0 0 0.35rem; font-size: 0.8rem; opacity: 0.92; font-weight: 600; }
        .group-description { margin: 0; font-size: 0.85rem; opacity: 0.85; }

        /* ===== Three-layer research topic system ===== */
        .topic-shell {
            position: relative;
            display: grid;
            grid-template-columns: 5.3rem 1fr;
            gap: 0;
            margin-top: 1rem;
            align-items: start;
        }

        .high-tag-rail {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            align-items: flex-end;
            padding-top: 1.25rem;
        }

        .high-tab {
            width: 5.75rem;
            min-height: 3.35rem;
            padding: 0.55rem 0.7rem;
            border: 1px solid rgba(255,255,255,0.14);
            border-right: 0;
            border-radius: 14px 0 0 14px;
            background: rgba(35, 45, 67, 0.84);
            color: #eaf2ff;
            cursor: pointer;
            text-align: left;
            transform: translateX(0.62rem);
            box-shadow: inset -14px 0 18px rgba(0,0,0,0.10), 0 10px 22px rgba(0,0,0,0.12);
            transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }

        .high-tab:hover,
        .high-tab.active {
            transform: translateX(1px);
            background: var(--panel-bg);
            border-color: rgba(255,255,255,0.18);
        }

        .topic-board {
            min-height: 420px;
            background:
                radial-gradient(circle at 15% 0%, rgba(159,201,255,0.12), transparent 34%),
                linear-gradient(135deg, rgba(255,255,255,0.09), rgba(255,255,255,0.045));
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 18px;
            padding: 1.15rem 1.15rem 1.3rem;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 18px 36px rgba(0,0,0,0.18);
        }

        .topic-heading {
            margin: 0 0 0.25rem;
            font-size: 1.1rem;
        }

        .topic-desc {
            margin: 0 0 1.25rem;
            font-size: 0.9rem;
            opacity: 0.82;
        }

        .mid-row {
            margin: 0 0 1.15rem;
            padding: 0.95rem;
            border: 0;
            border-radius: 16px;
            background: var(--mid-bg, rgba(255,255,255,0.08));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 24px rgba(0,0,0,0.10);
        }

        .mid-row:nth-of-type(3n + 1) { --mid-bg: linear-gradient(135deg, rgba(75,108,183,0.28), rgba(24,40,72,0.22)); }
        .mid-row:nth-of-type(3n + 2) { --mid-bg: linear-gradient(135deg, rgba(39,174,96,0.18), rgba(20,90,70,0.18)); }
        .mid-row:nth-of-type(3n + 3) { --mid-bg: linear-gradient(135deg, rgba(155,89,182,0.20), rgba(75,44,108,0.18)); }

        .mid-label {
            margin: 0 0 0.8rem;
            font-size: 0.92rem;
            font-weight: 700;
            opacity: 0.95;
            letter-spacing: 0.01em;
        }

        .low-box-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }

        .low-box {
            appearance: none;
            cursor: pointer;
            min-height: 96px;
            text-align: left;
            font: inherit;
        }

        .low-box.active {
            border-color: rgba(0, 220, 190, 0.55);
            background: rgba(0, 220, 190, 0.14);
        }

        .low-title {
            display: block;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .low-desc {
            display: block;
            font-size: 0.82rem;
            line-height: 1.35;
            opacity: 0.82;
        }

        /* Full-screen sweeping topic panel */
        .topic-panel-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: none;
            background: rgba(3, 7, 18, 0.62);
            backdrop-filter: blur(8px);
        }

        .topic-panel-overlay.open { display: block; }

        .topic-panel-sheet {
            position: absolute;
            top: 0;
            right: 0;
            width: min(760px, 88vw);
            height: 100%;
            box-sizing: border-box;
            padding: 2rem;
            background:
                radial-gradient(circle at 15% 18%, rgba(0,220,190,0.13), transparent 32%),
                radial-gradient(circle at 86% 10%, rgba(159,201,255,0.14), transparent 34%),
                linear-gradient(135deg, rgba(15,23,42,0.98), rgba(31,41,55,0.98));
            border-left: 1px solid rgba(255,255,255,0.15);
            box-shadow: -26px 0 60px rgba(0,0,0,0.38);
            transform: translateX(100%);
            animation: sweepIn 0.28s ease forwards;
            overflow-y: auto;
        }

        @keyframes sweepIn { to { transform: translateX(0); } }

        .topic-panel-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 2.35rem;
            height: 2.35rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.10);
            color: #fff;
            cursor: pointer;
            font-size: 1.25rem;
        }

        .panel-kicker {
            margin: 0 0 0.7rem;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.72;
        }

        .topic-panel-sheet h3 {
            margin: 0 2.5rem 0.65rem 0;
            font-size: clamp(1.7rem, 4vw, 2.6rem);
        }

        .topic-panel-sheet p {
            margin: 0 0 1.1rem;
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        .tag-chip-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }

        .tag-chip {
            font-size: 0.78rem;
            padding: 0.45rem 0.65rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.14);
            color: #eaf2ff;
        }

        @media (max-width: 720px) {
            .topic-shell { grid-template-columns: 1fr; }
            .high-tag-rail { flex-direction: row; overflow-x: auto; align-items: stretch; padding-top: 0; margin-bottom: 0.8rem; }
            .high-tab {
                width: auto;
                min-width: 90px;
                border-right: 1px solid rgba(255,255,255,0.14);
                border-radius: 12px;
                transform: none;
            }
            .high-tab:hover,
            .high-tab.active { transform: none; }
            .low-box-row { grid-template-columns: 1fr; }
            .topic-panel-sheet { width: 100vw; padding: 1.35rem; }
        }

        .back-wrap {
            display: flex;
            justify-content: center;
            margin-top: 1.25rem;
        }

        a.back-btn {
            display: inline-block;
            text-decoration: none;
            font-weight: 700;
            color: #eaf2ff;
            background: rgba(159, 201, 255, 0.16);
            border: 1px solid rgba(159, 201, 255, 0.28);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.35);
        }
    </style>
</head>
<body>

<header>
    <h1 id="page-title">Loading…</h1>
    <p id="page-subtitle">Loading…</p>
</header>

<div class="container" id="content-root">
    <div class="back-wrap">
        <a class="back-btn" id="back-link" href="../../index.html">Back to my Portfolio</a>
    </div>
</div>

<div class="topic-panel-overlay" id="topic-panel-overlay" aria-hidden="true">
    <div class="topic-panel-sheet" role="dialog" aria-modal="true" aria-labelledby="topic-panel-title">
        <button class="topic-panel-close" id="topic-panel-close" type="button" aria-label="Close topic panel">×</button>
        <p class="panel-kicker">Research Topic</p>
        <h3 id="topic-panel-title"></h3>
        <p id="topic-panel-desc"></p>
        <div class="tag-chip-row" id="topic-panel-tags"></div>
    </div>
</div>

<script>
const STATIC_QUOTE_TEXT = "“If I am walking with two other men, each of them will serve as my teacher.”";
const STATIC_QUOTE_AUTHOR = "Confucius";

function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = text;
    return node;
}

function makeCard(card, openNewTab) {
    const isGroup = !!card.affiliation;
    const href = card.href || "#";

    const a = document.createElement("a");
    a.className = `hub-card${isGroup ? " group-card" : ""}`;
    a.href = href;

    if (openNewTab) {
        a.target = "_blank";
        a.rel = "noopener";
    }

    a.appendChild(el("div", "hub-card-title", card.title || ""));

    if (isGroup) {
        if (card.affiliation) a.appendChild(el("p", "group-affiliation", card.affiliation));
        if (card.desc) a.appendChild(el("p", "group-description", card.desc));
    } else {
        if (card.desc) a.appendChild(el("p", "hub-card-desc", card.desc));
    }

    return a;
}

function setupTopicOverlay() {
    const overlay = document.getElementById("topic-panel-overlay");
    const closeBtn = document.getElementById("topic-panel-close");

    function closePanel() {
        overlay.classList.remove("open");
        overlay.setAttribute("aria-hidden", "true");
        document.querySelectorAll(".low-box.active").forEach(btn => btn.classList.remove("active"));
    }

    closeBtn.addEventListener("click", closePanel);
    overlay.addEventListener("click", event => {
        if (event.target === overlay) closePanel();
    });
    document.addEventListener("keydown", event => {
        if (event.key === "Escape" && overlay.classList.contains("open")) closePanel();
    });
}

function openTopicPanel(lowTag, button) {
    document.querySelectorAll(".low-box.active").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

    const overlay = document.getElementById("topic-panel-overlay");
    const title = document.getElementById("topic-panel-title");
    const desc = document.getElementById("topic-panel-desc");
    const tags = document.getElementById("topic-panel-tags");

    title.textContent = lowTag.label || "Untitled topic";
    desc.textContent = lowTag.desc || "No description added yet.";
    tags.innerHTML = "";

    (lowTag.paperTags || []).forEach(tag => tags.appendChild(el("span", "tag-chip", tag)));

    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden", "false");
}

function makeLowBox(lowTag) {
    const lowButton = document.createElement("button");
    lowButton.className = "low-box";
    lowButton.type = "button";

    lowButton.appendChild(el("span", "low-title", lowTag.label || "Untitled box"));
    lowButton.appendChild(el("span", "low-desc", lowTag.desc || "Open topic panel."));

    lowButton.addEventListener("click", () => openTopicPanel(lowTag, lowButton));
    return lowButton;
}

function renderTopicBoard(section, tagData) {
    const wrap = el("div", "section");
    if (section.title) wrap.appendChild(el("h2", "", section.title));
    if (section.intro) wrap.appendChild(el("p", "section-intro", section.intro));

    const shell = el("div", "topic-shell");
    const rail = el("div", "high-tag-rail");
    const board = el("div", "topic-board");
    shell.appendChild(rail);
    shell.appendChild(board);
    wrap.appendChild(shell);

    function renderHighTag(highTag, selectedButton) {
        rail.querySelectorAll(".high-tab").forEach(btn => btn.classList.remove("active"));
        selectedButton.classList.add("active");

        board.innerHTML = "";
        board.appendChild(el("h3", "topic-heading", highTag.label || "Untitled folder"));
        board.appendChild(el("p", "topic-desc", highTag.desc || ""));

        (highTag.midTags || []).forEach(midTag => {
            const midRow = el("div", "mid-row");
            midRow.appendChild(el("div", "mid-label", midTag.label || "Untitled row"));

            const lowRow = el("div", "low-box-row");
            (midTag.lowTags || []).forEach(lowTag => lowRow.appendChild(makeLowBox(lowTag)));

            midRow.appendChild(lowRow);
            board.appendChild(midRow);
        });
    }

    (tagData.highTags || []).forEach((highTag, index) => {
        const tab = el("button", "high-tab", highTag.label || `High ${index + 1}`);
        tab.type = "button";
        tab.addEventListener("click", () => renderHighTag(highTag, tab));
        rail.appendChild(tab);

        if (index === 0) renderHighTag(highTag, tab);
    });

    return wrap;
}

function renderSection(section, index, tagData) {
    if (section.type === "tag-topics") return renderTopicBoard(section, tagData);

    const wrap = el("div", "section");

    if (section.title) wrap.appendChild(el("h2", "", section.title));

    if (section.title === "Know Your Peers") {
        const q = el("p", "section-quote");
        q.textContent = `${STATIC_QUOTE_TEXT} — `;
        const span = document.createElement("span");
        span.style.fontStyle = "normal";
        span.textContent = STATIC_QUOTE_AUTHOR;
        q.appendChild(span);
        wrap.appendChild(q);
        wrap.appendChild(document.createElement("br"));
    }

    if (section.intro) wrap.appendChild(el("p", "section-intro", section.intro));

    const row = el("div", "scroll-row");

    /* Research Toolkit and Know Your Peers open in a new tab */
    const openNewTab = (section.title === "Research Toolkit" || section.title === "Know Your Peers");

    (section.cards || []).forEach(card => row.appendChild(makeCard(card, openNewTab)));

    wrap.appendChild(row);
    return wrap;
}

async function loadHubPage() {
    const root = document.getElementById("content-root");
    const h1 = document.getElementById("page-title");
    const subtitle = document.getElementById("page-subtitle");
    const backLink = document.getElementById("back-link");

    const [pageRes, tagRes] = await Promise.all([
        fetch("hub-page.json", { cache: "no-store" }),
        fetch("topic-tags.json", { cache: "no-store" })
    ]);

    const data = await pageRes.json();
    const tagData = await tagRes.json();

    document.title = data.title || "Research Hub";
    h1.textContent = data.title || "Research Hub";
    subtitle.textContent = data.subtitle || "";

    const backWrap = backLink.closest(".back-wrap");
    root.innerHTML = "";
    root.appendChild(backWrap);

    (data.sections || []).forEach((section, i) => {
        const node = renderSection(section, i, tagData);
        root.insertBefore(node, backWrap);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    setupTopicOverlay();
    loadHubPage();
});
</script>

</body>
</html>
