        .paper-side-tags {
            display: grid;

        .paper-side-tag {

        .panel-nav-btn .nav-label {

        .panel-nav-btn .nav-topic {

        /* ===== Follow-up polish: flatten topic board + softer peer typography ===== */
        .topic-board {
            min-height: auto;

            flex: 0 0 auto;

        .high-tab:hover,

        .peer-row-title {

        .peer-row .group-description {

        /* ===== Rectangular fades + refined high-tag research-blue styling ===== */
        .high-tab {
            font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif;

            color: rgba(232, 239, 252, 0.86);
            background:
                radial-gradient(circle at 18% 12%, rgba(118, 156, 220, 0.16), transparent 46%),

            border-color: rgba(139, 174, 230, 0.22);

        .high-tab:hover {

            box-shadow:

        .high-tab.active {
            font-weight: 600;

                radial-gradient(circle at 18% 10%, rgba(130, 176, 255, 0.28), transparent 48%),
                linear-gradient(135deg, rgba(52, 78, 126, 0.98), rgba(28, 48, 88, 0.98));
            border-color: rgba(170, 205, 255, 0.42);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.12),
                inset 0 -12px 22px rgba(0,0,0,0.12),
                0 0 0 1px rgba(140, 185, 255, 0.10),
                0 0 22px rgba(80, 140, 255, 0.35),
                0 12px 26px rgba(0,0,0,0.22);
        }

        /* Smart side fade for horizontally scrolling rows.
           JS adds fade-left / fade-right only when hidden content exists there,
           so the first/last visible cards do not fade at the scroll extremes. */
        .scroll-row,
        .low-box-row {
            -webkit-mask-image: none;
            mask-image: none;

        .scroll-row.fade-left.fade-right,
        .low-box-row.fade-left.fade-right {
            -webkit-mask-image: linear-gradient(
                90deg,
                transparent 0%,
                black 8%,
                black 92%,

            );
            mask-image: linear-gradient(
                90deg,
                transparent 0%,
                black 8%,

        .scroll-row.fade-left:not(.fade-right),

                90deg,
                transparent 0%,
                black 8%,
                black 100%
            );

        .scroll-row.fade-right:not(.fade-left),

        /* Uniform rectangular fade for mid-level topic boxes and peer group category boxes */
        .mid-row,
        .peer-row {
            position: relative;
            overflow: hidden;
            isolation: isolate;
            -webkit-mask-image:
                linear-gradient(to right, transparent 0%, black 2%, black 98%, transparent 100%),
                linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
            mask-image:
                linear-gradient(to right, transparent 0%, black 2%, black 98%, transparent 100%),
                linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
            -webkit-mask-composite: source-in;
            mask-composite: intersect;
        }

/* ===== GLOBAL FONT FIX (NO MORE FALLBACK GARBAGE) ===== */

<header>
    <h1 id="page-title">Loading…</h1>
    <p id="page-subtitle">Loading…</p>
</header>

<div class="container" id="content-root">
    <div class="back-wrap">
        <a class="back-btn" id="back-link" href="../../index.html">Back to my Portfolio</a>
    </div>
</div>

<div class="topic-panel-overlay" id="topic-panel-overlay" aria-hidden="true">
    <div class="topic-panel-sheet" role="dialog" aria-modal="true" aria-labelledby="topic-panel-title">
        <div class="topic-panel-actions" aria-label="Cycle through low-level topics">
            <button class="panel-nav-mini prev" id="topic-panel-prev" type="button" title="Previous topic">
                <span class="nav-chevron">‹</span><span class="nav-label">Previous:</span><span class="nav-topic">Low 1</span>
            </button>
            <button class="panel-nav-mini next" id="topic-panel-next" type="button" title="Next topic">
                <span class="nav-label">Next:</span><span class="nav-topic">Low 3</span><span class="nav-chevron">›</span>
            </button>
            <button class="topic-panel-close" id="topic-panel-close" type="button" aria-label="Close topic panel">×</button>

        <p id="topic-panel-desc"></p>
        <div class="tag-chip-row" id="topic-panel-tags"></div>
        <div class="panel-paper-section">
            <h4 class="panel-paper-heading"></h4>
            <div class="panel-paper-list" id="topic-panel-papers"></div>
        </div>
    </div>
</div>

<script>
const STATIC_QUOTE_TEXT = "“If I am walking with two other men, each of them will serve as my teacher.”";
const STATIC_QUOTE_AUTHOR = "Confucius";
let topicPanelState = { lowTags: [], index: 0, buttons: [] };
let masterPaperLibrary = { papers: [] };

function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = text;
    return node;
}

function makeCard(card, openNewTab) {
    const isGroup = !!card.affiliation;
    const href = card.href || "#";

    const a = document.createElement("a");
    a.className = `hub-card${isGroup ? " group-card" : ""}`;
    a.href = href;

    if (openNewTab) {
        a.target = "_blank";
        a.rel = "noopener";
    }

    a.appendChild(el("div", "hub-card-title", card.title || ""));

    if (isGroup) {
        if (card.affiliation) a.appendChild(el("p", "group-affiliation", card.affiliation));
        if (card.desc) a.appendChild(el("p", "group-description", card.desc));
    } else {
        if (card.desc) a.appendChild(el("p", "hub-card-desc", card.desc));
    }

    return a;
}


function normalizeTagText(value) {
    return String(value || "").trim().toLowerCase();
}

function labelPathToString(path) {
    return Array.isArray(path) ? path.join(" > ") : String(path || "");
}

function splitTagPath(tagPath) {
    if (Array.isArray(tagPath)) return tagPath.map(value => String(value).trim()).filter(Boolean);
    return String(tagPath || "").split(">").map(value => value.trim()).filter(Boolean);
}

function sameLabelPath(a, b) {
    const left = splitTagPath(a);
    const right = splitTagPath(b);
    if (left.length !== right.length) return false;
    return left.every((value, index) => normalizeTagText(value) === normalizeTagText(right[index]));
}

function parseEndNoteCitation(raw) {
    const parsed = {
        type: "",
        title: "",
        authors: [],
        journal: "",
        year: "",
        doi: "",
        url: ""
    };

    String(raw || "")
        .replace(/\\n/g, "\n")
        .split(/\r?\n/)
        .forEach(line => {
            const match = line.match(/^%([A-Z0-9@\[\]])\s+(.*)$/);
            if (!match) return;

            const code = match[1];
            const value = match[2].trim();

            if (code === "0") parsed.type = value;
            if (code === "T") parsed.title = value;
            if (code === "A") parsed.authors.push(formatAuthorName(value));
            if (code === "J" || code === "B") parsed.journal = parsed.journal || value;
            if (code === "D") parsed.year = value;
            if (code === "R") parsed.doi = value;
            if (code === "U") parsed.url = value;
        });

    if (!parsed.url && parsed.doi) parsed.url = `https://doi.org/${parsed.doi}`;
    return parsed;
}

function formatAuthorName(name) {
    const clean = String(name || "").trim();
    if (!clean.includes(",")) return clean;

    const parts = clean.split(",");
    const family = (parts[0] || "").trim();
    const given = parts.slice(1).join(",").trim();

    return [given, family].filter(Boolean).join(" ");
}

function formatAuthorName(name) {
    const clean = String(name || "").trim();
    if (!clean.includes(",")) return clean;

    const parts = clean.split(",");
    const family = (parts[0] || "").trim();
    const given = parts.slice(1).join(",").trim();

    return [given, family].filter(Boolean).join(" ");
}

function getPaperCitation(paper) {
    return paper.citation || parseEndNoteCitation(paper.citationRaw || paper.rawCitation || "");
}

function formatAuthors(authors) {
    if (!Array.isArray(authors) || authors.length === 0) return "Unknown authors";
    return authors.map(author => {
        if (typeof author === "string") return author;
        return [author.given, author.family].filter(Boolean).join(" ").trim() || "Unknown author";
    }).join(", ");
}

function includesNormalized(list, value) {
    if (!Array.isArray(list)) return false;
    const target = normalizeTagText(value);
    return list.some(item => normalizeTagText(item) === target);
}

function paperMatchesLabelPath(paper, labelPath) {
    const path = splitTagPath(labelPath);
    const [activeHigh, activeMid, activeLow] = path;

    /*
       New structured paper tag format:

       "topicTags": {
         "high": ["Epitaxial Growth", "Etching"],
         "mid": ["Characterization", "Growth Methods"],
         "low": ["SEM", "AFM", "LPCVD"]
       }

       A paper can have multiple high, mid, and low tags.
       A low-topic panel matches only when all three active labels are present.
    */
    const structuredTags = paper.topicTags || paper.tags || {};

    if (
        structuredTags &&
        typeof structuredTags === "object" &&
        !Array.isArray(structuredTags) &&
        ("high" in structuredTags || "mid" in structuredTags || "low" in structuredTags)
    ) {
        return (
            includesNormalized(structuredTags.high, activeHigh) &&
            includesNormalized(structuredTags.mid, activeMid) &&
            includesNormalized(structuredTags.low, activeLow)
        );
    }

    /*
       Backward compatibility:
       older paper files may still use:
       "topicTags": ["Epitaxial Growth > Characterization > SEM"]
    */
    if (Array.isArray(structuredTags)) {
        return structuredTags.some(pathValue => sameLabelPath(pathValue, labelPath));
    }

    return false;
}

function makePaperCard(paper) {
    const citation = getPaperCitation(paper);
    const href = citation.url || (citation.doi ? `https://doi.org/${citation.doi}` : "#");
    const card = document.createElement(href === "#" ? "div" : "a");
    card.className = "panel-paper-card";

    if (href !== "#") {
        card.href = href;
        card.target = "_blank";
        card.rel = "noopener";
    }

    const title = citation.title || paper.title || "Untitled paper";
    const dateText = citation.year || "Date unknown";
    const journal = citation.journal || citation["container-title"] || "Journal unknown";
    const authors = formatAuthors(citation.authors || citation.author);
    const doi = citation.doi ? `DOI: ${citation.doi}` : "DOI unavailable";

    const inner = el("div", "panel-paper-card-inner");
    const main = el("div", "panel-paper-main");
    const sideTags = el("div", "paper-side-tags");

    main.appendChild(el("p", "panel-paper-title", title));
    main.appendChild(el("p", "panel-paper-authors", authors));
    main.appendChild(el("p", "panel-paper-meta", `${journal} · ${dateText}`));
    main.appendChild(el("p", "panel-paper-doi", doi));

    if (paper.summary) {
        main.appendChild(el("p", "panel-paper-summary", paper.summary));
    }

    const structuredTags = paper.topicTags || paper.tags || {};
    if (structuredTags && typeof structuredTags === "object" && !Array.isArray(structuredTags)) {
        (structuredTags.high || []).forEach(tag => sideTags.appendChild(el("span", "paper-side-tag high", tag)));
        (structuredTags.low || []).forEach(tag => sideTags.appendChild(el("span", "paper-side-tag low", tag)));
    }

    inner.appendChild(main);
    if (sideTags.childNodes.length) inner.appendChild(sideTags);
    card.appendChild(inner);

    return card;
}

function renderMatchingPapers(labelPath) {
    const paperList = document.getElementById("topic-panel-papers");
    paperList.innerHTML = "";

    const matches = (masterPaperLibrary.papers || []).filter(paper => paperMatchesLabelPath(paper, labelPath));

    if (!matches.length) {
        paperList.appendChild(el("p", "panel-empty-note", "No papers tagged to this topic yet."));
        return;
    }

    matches.forEach(paper => paperList.appendChild(makePaperCard(paper)));
}

function setupTopicOverlay() {
    const overlay = document.getElementById("topic-panel-overlay");
    const sheet = document.querySelector(".topic-panel-sheet");
    const closeBtn = document.getElementById("topic-panel-close");

    function closePanel() {
        overlay.classList.remove("open");
        overlay.setAttribute("aria-hidden", "true");
        document.querySelectorAll(".low-box.active").forEach(btn => btn.classList.remove("active"));
    }

    function goPreviousTopic() {
        if (topicPanelState.index > 0) setTopicPanelContent(topicPanelState.index - 1);
    }

    function goNextTopic() {
        if (topicPanelState.index < topicPanelState.lowTags.length - 1) setTopicPanelContent(topicPanelState.index + 1);
    }

    closeBtn.addEventListener("click", closePanel);

    document.getElementById("topic-panel-prev").addEventListener("click", goPreviousTopic);
    document.getElementById("topic-panel-next").addEventListener("click", goNextTopic);

    let dragStartX = 0;
    let dragStartY = 0;
    let dragPointerId = null;
    let dragMoved = false;

    sheet.addEventListener("pointerdown", event => {
        if (!overlay.classList.contains("open")) return;
        if (event.pointerType !== "touch") return;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragPointerId = event.pointerId;
        dragMoved = false;
        sheet.classList.add("dragging");
        sheet.setPointerCapture?.(event.pointerId);
    });

    sheet.addEventListener("pointermove", event => {
        if (dragPointerId !== event.pointerId) return;
        const dx = event.clientX - dragStartX;
        const dy = event.clientY - dragStartY;
        if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) dragMoved = true;
    });

    sheet.addEventListener("pointerup", event => {
        if (dragPointerId !== event.pointerId) return;
        const dx = event.clientX - dragStartX;
        const dy = event.clientY - dragStartY;
        dragPointerId = null;
        sheet.classList.remove("dragging");
        sheet.releasePointerCapture?.(event.pointerId);

        if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.25) return;
        if (dx > 0) goPreviousTopic();
        if (dx < 0) goNextTopic();
    });

    sheet.addEventListener("pointercancel", event => {
        if (dragPointerId !== event.pointerId) return;
        dragPointerId = null;
        dragMoved = false;
        sheet.classList.remove("dragging");
    });

    sheet.addEventListener("click", event => {
        if (!dragMoved) return;
        const clickable = event.target.closest("a, button");
        if (clickable) {
            event.preventDefault();
            event.stopPropagation();
        }
        dragMoved = false;
    }, true);

    overlay.addEventListener("click", event => {
        if (event.target === overlay) closePanel();
    });
    document.addEventListener("keydown", event => {
        if (event.key === "Escape" && overlay.classList.contains("open")) closePanel();
        if (event.key === "ArrowLeft" && overlay.classList.contains("open")) goPreviousTopic();
        if (event.key === "ArrowRight" && overlay.classList.contains("open")) goNextTopic();
    });
}

function setTopicPanelContent(index) {
    const lowTag = topicPanelState.lowTags[index];
    if (!lowTag) return;

    topicPanelState.index = index;

    document.querySelectorAll(".low-box.active").forEach(btn => btn.classList.remove("active"));
    const activeButton = topicPanelState.buttons[index];
    if (activeButton) activeButton.classList.add("active");

    const title = document.getElementById("topic-panel-title");
    const desc = document.getElementById("topic-panel-desc");
    const tags = document.getElementById("topic-panel-tags");
    const prev = document.getElementById("topic-panel-prev");
    const next = document.getElementById("topic-panel-next");

    title.textContent = lowTag.label || "Untitled topic";
    desc.textContent = lowTag.desc || "No description added yet.";
    tags.innerHTML = "";

    /*
       Label-driven paper tags:
       Do not hard-code paperTags in the JSON. The visible tags are generated
       from the current high / mid / low labels, so renaming a label updates
       the panel everywhere automatically.
    */
    const labelPath = lowTag.labelPath || [lowTag.label].filter(Boolean);
    tags.innerHTML = "";
    labelPath.forEach((tag, tagIndex) => {
        const levelClass = tagIndex === 0 ? "high" : (tagIndex === 1 ? "mid" : "low");
        tags.appendChild(el("span", `tag-flow-node ${levelClass}`, tag));
        if (tagIndex < labelPath.length - 1) tags.appendChild(el("span", "tag-flow-arrow", "›"));
    });
    renderMatchingPapers(labelPath);

    const prevTag = topicPanelState.lowTags[index - 1];
    const nextTag = topicPanelState.lowTags[index + 1];

    prev.disabled = !prevTag;
    next.disabled = !nextTag;

    prev.querySelector(".nav-topic").textContent = prevTag ? (prevTag.label || "Previous topic") : "None";
    next.querySelector(".nav-topic").textContent = nextTag ? (nextTag.label || "Next topic") : "None";
    prev.title = prevTag ? `Previous: ${prevTag.label || "Previous topic"}` : "No previous topic";
    next.title = nextTag ? `Next: ${nextTag.label || "Next topic"}` : "No next topic";
}

function openTopicPanel(lowTags, index, buttons) {
    topicPanelState = { lowTags, index, buttons };
    setTopicPanelContent(index);

    const overlay = document.getElementById("topic-panel-overlay");
    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden", "false");
}

function makeLowBox(lowTag, lowTags, index, buttons) {
    const lowButton = document.createElement("button");
    lowButton.className = "low-box hub-card";
    lowButton.type = "button";

    lowButton.appendChild(el("span", "low-title", lowTag.label || "Untitled box"));
    lowButton.appendChild(el("span", "low-desc", lowTag.desc || "Open topic panel."));

    lowButton.addEventListener("click", () => openTopicPanel(lowTags, index, buttons));
    return lowButton;
}

function renderTopicBoard(section, tagData) {
    const wrap = el("div", "section");
    if (section.title) wrap.appendChild(el("h2", "", section.title));
    if (section.intro) wrap.appendChild(el("p", "section-intro", section.intro));

    const shell = el("div", "topic-shell");
    const rail = el("div", "high-tag-rail");
    const board = el("div", "topic-board");
    shell.appendChild(rail);
    shell.appendChild(board);
    wrap.appendChild(shell);

    function renderHighTag(highTag, selectedButton) {
        rail.querySelectorAll(".high-tab").forEach(btn => btn.classList.remove("active"));
        selectedButton.classList.add("active");

        board.innerHTML = "";
        board.appendChild(el("h3", "topic-heading", highTag.label || "Untitled folder"));
        board.appendChild(el("p", "topic-desc", highTag.desc || ""));

        (highTag.midTags || []).forEach(midTag => {
            const midRow = el("div", "mid-row");
            midRow.appendChild(el("div", "mid-label", midTag.label || "Untitled row"));

            if (midTag.desc) {
                midRow.appendChild(el("p", "mid-desc", midTag.desc));
            }

            const lowRow = el("div", "low-box-row");

            /*
               Build low-topic objects with a labelPath used by the panel.
               IDs remain generic and stable; labels are the only editable names.
            */
            const lowTags = (midTag.lowTags || []).map(lowTag => ({
                ...lowTag,
                labelPath: [
                    highTag.label || "Untitled folder",
                    midTag.label || "Untitled row",
                    lowTag.label || "Untitled topic"
                ]
            }));

            const lowButtons = [];
            lowTags.forEach((lowTag, lowIndex) => {
                const lowButton = makeLowBox(lowTag, lowTags, lowIndex, lowButtons);
                lowButtons.push(lowButton);
                lowRow.appendChild(lowButton);
            });

            midRow.appendChild(lowRow);
            board.appendChild(midRow);
            requestAnimationFrame(() => updateScrollFade(lowRow));
        });
    }

    (tagData.highTags || []).forEach((highTag, index) => {
        const tab = el("button", "high-tab", highTag.label || `High ${index + 1}`);
        tab.type = "button";
        tab.addEventListener("click", () => renderHighTag(highTag, tab));
        rail.appendChild(tab);

        if (index === 0) renderHighTag(highTag, tab);
    });

    return wrap;
}

function renderSection(section, index, tagData) {
    if (section.type === "tag-topics") return renderTopicBoard(section, tagData);

    const wrap = el("div", "section");

    if (section.title) wrap.appendChild(el("h2", "", section.title));

    if (section.title === "Know Your Peers") {
        const q = el("p", "section-quote");
        q.textContent = `${STATIC_QUOTE_TEXT} — `;
        const span = document.createElement("span");
        span.style.fontStyle = "normal";
        span.textContent = STATIC_QUOTE_AUTHOR;
        q.appendChild(span);
        wrap.appendChild(q);
        wrap.appendChild(document.createElement("br"));
    }

    if (section.intro) wrap.appendChild(el("p", "section-intro", section.intro));

    /* Research Toolkit and Know Your Peers open in a new tab */
    const openNewTab = (section.title === "Research Toolkit" || section.title === "Know Your Peers");

    if (Array.isArray(section.peerRows) && section.peerRows.length) {
        section.peerRows.forEach(peerRow => {
            const rowWrap = el("div", `peer-row ${peerRow.className || ""}`.trim());
            if (peerRow.title) rowWrap.appendChild(el("h3", "peer-row-title", peerRow.title));

            const row = el("div", "scroll-row");
            (peerRow.cards || []).forEach(card => row.appendChild(makeCard(card, openNewTab)));
            rowWrap.appendChild(row);
            wrap.appendChild(rowWrap);
        });
        return wrap;
    }

    const row = el("div", "scroll-row");
    (section.cards || []).forEach(card => row.appendChild(makeCard(card, openNewTab)));

    wrap.appendChild(row);
    return wrap;
}


async function loadPaperLibraryFromManifest() {
    try {
        const manifestRes = await fetch("papers/manifest.json", { cache: "no-store" });
        if (!manifestRes.ok) return { papers: [] };

        const manifest = await manifestRes.json();
        const files = Array.isArray(manifest) ? manifest : (manifest.files || []);

        const papers = await Promise.all(files.map(async file => {
            const path = typeof file === "string" ? file : file.file;
            if (!path) return null;
            const paperRes = await fetch(`papers/${path}`, { cache: "no-store" });
            if (!paperRes.ok) return null;
            return await paperRes.json();
        }));

        return { papers: papers.filter(Boolean) };
    } catch (error) {
        console.warn("Could not load papers/manifest.json", error);
        return { papers: [] };
    }
}

async function loadHubPage() {
    const root = document.getElementById("content-root");
    const h1 = document.getElementById("page-title");
    const subtitle = document.getElementById("page-subtitle");
    const backLink = document.getElementById("back-link");

    const [pageRes, tagRes] = await Promise.all([
        fetch("hub-page.json", { cache: "no-store" }),
        fetch("topic-tags.json", { cache: "no-store" })
    ]);

    const data = await pageRes.json();
    const tagData = await tagRes.json();
    masterPaperLibrary = await loadPaperLibraryFromManifest();

    document.title = data.title || "Research Hub";
    h1.textContent = data.title || "Research Hub";
    subtitle.textContent = data.subtitle || "";

    const backWrap = backLink.closest(".back-wrap");
    root.innerHTML = "";
    root.appendChild(backWrap);

    (data.sections || []).forEach((section, i) => {
        const node = renderSection(section, i, tagData);
        root.insertBefore(node, backWrap);
    });
}

function updateScrollFade(row) {
    if (!row) return;

    const maxScroll = row.scrollWidth - row.clientWidth;
    const threshold = 2;

    row.classList.toggle("fade-left", row.scrollLeft > threshold);
    row.classList.toggle("fade-right", row.scrollLeft < maxScroll - threshold);
}

function setupSmartScrollFades(scope = document) {
    const rows = scope.querySelectorAll(".scroll-row, .low-box-row");

    rows.forEach(row => {
        updateScrollFade(row);

        if (row.dataset.smartFadeReady === "true") return;
        row.dataset.smartFadeReady = "true";

        row.addEventListener("scroll", () => updateScrollFade(row), { passive: true });
    });
}

window.addEventListener("resize", () => setupSmartScrollFades());

document.addEventListener("DOMContentLoaded", () => {
    setupTopicOverlay();
    loadHubPage().then(() => {
        setupSmartScrollFades();
        requestAnimationFrame(() => setupSmartScrollFades());
    });
});
</script>
